<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suika Cooking Pot</title>
    <!-- ✅ Favicon support -->
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            cursor: none;
        }
        #game-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            max-width: 100vw;
            max-height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            z-index: 10;
            text-align: center;
        }
        #loading.error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">Loading game...<br><small style="font-size:14px;opacity:0.8">If stuck, check browser console (F12)</small></div>
        <canvas id="game"></canvas>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
        const loading = document.getElementById('loading');
        
        if (typeof Go === 'undefined') {
            loading.textContent = '❌ Error: wasm_exec.js not loaded';
            loading.classList.add('error');
            console.error('Go is not defined - wasm_exec.js failed to load');
        } else {
            const go = new Go();
            
            WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject)
                .then(result => {
                    loading.style.display = 'none';
                    go.run(result.instance);
                })
                .catch(err => {
                    loading.textContent = '❌ Error: ' + err.message;
                    loading.classList.add('error');
                    console.error('Failed to load game:', err);
                });
        }
    </script>
</body>
</html>
